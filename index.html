<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0f2744;
      --navy-mid:  #1a3c5e;
      --navy-light:#2a5282;
      --accent:    #f6ad2b;
      --accent2:   #e8f4fd;
      --green:     #1db87a;
      --red:       #e53e3e;
      --orange:    #dd6b20;
      --surface:   #ffffff;
      --bg:        #eef2f7;
      --border:    #dde3ec;
      --text:      #1a202c;
      --muted:     #718096;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(15,39,68,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 16px rgba(15,39,68,0.25);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .logo-text { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .last-sync { color: rgba(255,255,255,0.5); font-size: 12px; font-family: 'DM Mono', monospace; }
    .btn-refresh-header {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .btn-refresh-header:hover { background: rgba(255,255,255,0.2); }

    /* ── Stats Bar ── */
    .stats-bar {
      background: var(--navy-mid);
      padding: 14px 28px;
      display: flex;
      gap: 0;
    }
    .stat {
      flex: 1;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 0 16px;
    }
    .stat:first-child { text-align: left; padding-left: 0; }
    .stat:last-child  { border-right: none; text-align: right; padding-right: 0; }
    .stat-label { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
    .stat-value { color: #fff; font-size: 20px; font-weight: 700; }
    .stat-value.accent { color: var(--accent); }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--surface);
      padding: 12px 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
    }
    .search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: border 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--navy-light); background: #fff; }
    .search-input::placeholder { color: var(--muted); }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-add       { background: var(--green); color: #fff; }
    .btn-add:hover { background: #17a36c; }
    .btn-edit      { background: var(--accent2); color: var(--navy); border: 1px solid #bee3f8; font-size: 12px; padding: 5px 10px; }
    .btn-edit:hover { background: #bee3f8; }
    .btn-del       { background: #fff5f5; color: var(--red); border: 1px solid #fed7d7; font-size: 12px; padding: 5px 10px; }
    .btn-del:hover { background: #fed7d7; }

    /* ── Table ── */
    .table-container {
      padding: 20px 28px;
    }
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .table-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .table-title { font-weight: 700; font-size: 14px; color: var(--navy); }
    .count-badge {
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead tr { background: var(--bg); }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    th.num, td.num { text-align: right; }
    td {
      padding: 11px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: #f7faff; }

    .sap-code {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 5px;
      color: var(--navy-mid);
      border: 1px solid var(--border);
    }
    .row-num { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }
    .actions { display: flex; gap: 6px; }

    /* positive / negative amounts */
    .positive { color: var(--text); }
    .negative { color: var(--red); }

    /* ── States ── */
    .state-box {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; font-weight: 500; }
    .state-box small { font-size: 13px; opacity: 0.7; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,39,68,0.55);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(15,39,68,0.25);
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-head {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-head h3 { font-size: 16px; font-weight: 700; color: var(--navy); }
    .modal-close {
      background: var(--bg);
      border: none;
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      transition: border 0.18s, box-shadow 0.18s;
      background: #fff;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--navy-light);
      box-shadow: 0 0 0 3px rgba(42,82,130,0.12);
    }
    .form-group input:disabled {
      background: var(--bg);
      color: var(--muted);
      cursor: not-allowed;
    }
    .modal-foot {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-cancel {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--border); }

    /* ── Delete Confirm Modal ── */
    .del-modal { max-width: 380px; }
    .del-body { padding: 24px; text-align: center; }
    .del-icon { font-size: 40px; margin-bottom: 10px; }
    .del-body h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .del-body p { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .del-name { font-weight: 600; color: var(--red); }
    .del-foot {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: center;
    }
    .btn-confirm-del { background: var(--red); color: #fff; padding: 9px 22px; border-radius: var(--radius); border: none; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .btn-confirm-del:hover { background: #c53030; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--navy);
      color: #fff;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(15,39,68,0.25);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.25s;
      z-index: 999;
      display: flex; align-items: center; gap: 8px;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    @media (max-width: 600px) {
      header, .toolbar, .stats-bar, .table-container { padding-left: 16px; padding-right: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .stat-label { font-size: 10px; }
      .stat-value { font-size: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-text">Customer<span>DB</span></div>
  </div>
  <div class="header-right">
    <span class="last-sync" id="lastSync">—</span>
    <button class="btn-refresh-header" onclick="loadCustomers()">↺ Refresh</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">Total Customers</div>
    <div class="stat-value" id="sTot">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Volume (Ltrs/Kgs)</div>
    <div class="stat-value" id="sVol">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total Amount (KSH)</div>
    <div class="stat-value accent" id="sAmt">—</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search by SAP Code or Customer Name…" oninput="handleSearch()">
  </div>
  <button class="btn btn-add" onclick="openAdd()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
    Add Customer
  </button>
</div>

<!-- TABLE -->
<div class="table-container">
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Customer Records</span>
      <span class="count-badge" id="rowCount">0</span>
    </div>
    <div class="table-scroll">
      <div id="tableWrap">
        <div class="state-box">
          <div class="spinner"></div>
          <p>Loading from Google Sheet…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Add New Customer</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>SAP Code *</label>
        <input type="text" id="fSap" placeholder="e.g. 0000301237" maxlength="20">
      </div>
      <div class="form-group">
        <label>Customer Name *</label>
        <input type="text" id="fName" placeholder="e.g. KHETIA SUPERMARKET LTD">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Ltrs / Kgs</label>
          <input type="number" id="fLtrs" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Amount (KSH)</label>
          <input type="number" id="fAmt" placeholder="0">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-add" id="saveBtn" onclick="saveCustomer()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
        <span id="saveBtnText">Add Customer</span>
      </button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="overlay" id="delOverlay">
  <div class="modal del-modal">
    <div class="del-body">
      <div class="del-icon">🗑️</div>
      <h3>Delete Customer?</h3>
      <p>You are about to permanently delete<br><span class="del-name" id="delName"></span><br>This action cannot be undone.</p>
    </div>
    <div class="del-foot">
      <button class="btn-cancel" onclick="closeDelModal()">Cancel</button>
      <button class="btn-confirm-del" id="delConfirmBtn" onclick="doDelete()">Yes, Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let allCustomers = [];
  let isEditMode   = false;
  let pendingDelete = null;

  // ── Load ─────────────────────────────────────────────────
  function loadCustomers() {
    setTableState('loading');
    google.script.run
      .withSuccessHandler(onLoaded)
      .withFailureHandler(e => { setTableState('error', e.message); })
      .getAllCustomers();
  }

  function onLoaded(data) {
    allCustomers = data;
    renderStats(data);
    renderTable(data);
    document.getElementById('lastSync').textContent = 'Synced ' + new Date().toLocaleTimeString();
  }

  // ── Stats ─────────────────────────────────────────────────
  function renderStats(data) {
    const vol = data.reduce((s,c) => s + (Number(c.ltrsKgs)||0), 0);
    const amt = data.reduce((s,c) => s + (Number(c.amtKsh)||0), 0);
    document.getElementById('sTot').textContent = data.length.toLocaleString();
    document.getElementById('sVol').textContent = vol.toLocaleString();
    document.getElementById('sAmt').textContent = 'KSH ' + amt.toLocaleString();
  }

  // ── Table ─────────────────────────────────────────────────
  function renderTable(data) {
    document.getElementById('rowCount').textContent = data.length;
    if (!data.length) { setTableState('empty'); return; }

    let rows = data.map((c, i) => {
      const neg = Number(c.amtKsh) < 0;
      return `<tr>
        <td class="row-num">${i+1}</td>
        <td><span class="sap-code">${esc(c.sapCode)}</span></td>
        <td>${esc(c.name)}</td>
        <td class="num">${Number(c.ltrsKgs).toLocaleString()}</td>
        <td class="num ${neg?'negative':'positive'}">${Number(c.amtKsh).toLocaleString()}</td>
        <td>
          <div class="actions">
            <button class="btn btn-edit" onclick='openEdit(${JSON.stringify(c)})'>✏️ Edit</button>
            <button class="btn btn-del"  onclick="askDelete('${esc(c.sapCode)}','${esc(c.name.replace(/'/g,"\\'"))}')">🗑️</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>SAP Code</th><th>Name</th>
          <th class="num">Ltrs/Kgs</th><th class="num">Amt KSH</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function setTableState(state, msg) {
    const map = {
      loading: `<div class="state-box"><div class="spinner"></div><p>Loading from Google Sheet…</p></div>`,
      empty:   `<div class="state-box"><div class="icon">📭</div><p>No customers found.</p><small>Click "Add Customer" to get started.</small></div>`,
      error:   `<div class="state-box"><div class="icon">⚠️</div><p>Failed to load</p><small>${msg||''}</small></div>`
    };
    document.getElementById('tableWrap').innerHTML = map[state] || '';
  }

  // ── Search ────────────────────────────────────────────────
  function handleSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = q
      ? allCustomers.filter(c => c.sapCode.toLowerCase().includes(q) || c.name.toLowerCase().includes(q))
      : allCustomers;
    renderTable(filtered);
    document.getElementById('rowCount').textContent = filtered.length;
  }

  // ── Add / Edit Modal ──────────────────────────────────────
  function openAdd() {
    isEditMode = false;
    document.getElementById('modalTitle').textContent   = 'Add New Customer';
    document.getElementById('saveBtnText').textContent  = 'Add Customer';
    document.getElementById('fSap').value   = '';
    document.getElementById('fName').value  = '';
    document.getElementById('fLtrs').value  = '';
    document.getElementById('fAmt').value   = '';
    document.getElementById('fSap').disabled = false;
    document.getElementById('formOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fSap').focus(), 100);
  }

  function openEdit(c) {
    isEditMode = true;
    document.getElementById('modalTitle').textContent  = 'Edit Customer';
    document.getElementById('saveBtnText').textContent = 'Save Changes';
    document.getElementById('fSap').value   = c.sapCode;
    document.getElementById('fName').value  = c.name;
    document.getElementById('fLtrs').value  = c.ltrsKgs;
    document.getElementById('fAmt').value   = c.amtKsh;
    document.getElementById('fSap').disabled = true;
    document.getElementById('formOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('formOverlay').classList.remove('open');
  }

  function saveCustomer() {
    const sap  = document.getElementById('fSap').value.trim();
    const name = document.getElementById('fName').value.trim();
    if (!sap || !name) { showToast('SAP Code and Name are required.', 'error'); return; }

    const payload = {
      sapCode: sap, name,
      ltrsKgs: document.getElementById('fLtrs').value || 0,
      amtKsh:  document.getElementById('fAmt').value  || 0
    };

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('saveBtnText').textContent = 'Saving…';

    const fn = isEditMode ? 'updateCustomer' : 'addCustomer';
    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveBtnText').textContent = isEditMode ? 'Save Changes' : 'Add Customer';
        if (res.success) { closeModal(); showToast(res.message, 'success'); loadCustomers(); }
        else              showToast(res.message, 'error');
      })
      .withFailureHandler(e => {
        document.getElementById('saveBtn').disabled = false;
        document.getElementById('saveBtnText').textContent = isEditMode ? 'Save Changes' : 'Add Customer';
        showToast('Error: ' + e.message, 'error');
      })
      [fn](payload);
  }

  // ── Delete ────────────────────────────────────────────────
  function askDelete(sapCode, name) {
    pendingDelete = sapCode;
    document.getElementById('delName').textContent = name + ' (' + sapCode + ')';
    document.getElementById('delOverlay').classList.add('open');
  }

  function closeDelModal() {
    pendingDelete = null;
    document.getElementById('delOverlay').classList.remove('open');
  }

  function doDelete() {
    if (!pendingDelete) return;
    document.getElementById('delConfirmBtn').textContent = 'Deleting…';
    document.getElementById('delConfirmBtn').disabled = true;
    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('delConfirmBtn').textContent = 'Yes, Delete';
        document.getElementById('delConfirmBtn').disabled = false;
        closeDelModal();
        showToast(res.message, res.success ? 'success' : 'error');
        if (res.success) loadCustomers();
      })
      .withFailureHandler(e => {
        document.getElementById('delConfirmBtn').textContent = 'Yes, Delete';
        document.getElementById('delConfirmBtn').disabled = false;
        showToast('Error: ' + e.message, 'error');
      })
      .deleteCustomer(pendingDelete);
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    t.innerHTML = (icons[type]||'') + ' ' + msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast ' + type; }, 3500);
  }

  // ── Util ──────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Close overlays on background click ───────────────────
  document.getElementById('formOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('delOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDelModal();
  });

  // Init
  loadCustomers();
</script>
</body>
</html>
